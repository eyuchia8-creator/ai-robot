# RK3506 Voice Robot 配置文件
# 修改此文件后重启 voice_robot 生效

# ===================================================================
# app_config.ini — RK3506 Voice Robot 默认配置文件
# ===================================================================

[audio]
device = "hw:0,0"
sample_rate = 16000
channels = 1
record_duration_sec = 60

[wifi]
interface = "wlan0"
ssid = "your_ssid"
psk = "your_password"

[http]
server_url = "http://47.81.10.119/"
timeout_sec = 10

[display]
fb_device = "/dev/fb0"
font_path = "resources/NotoSansSC-Regular.ttf"
font_size_pt = 18
lcd_width = 240
lcd_height = 320

[gpio]
button_gpio = 0
led_gpio = 1

[system]
log_level = 2
